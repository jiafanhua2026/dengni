<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>等你女装</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 封面页面 -->
    <div id="cover" class="cover-page">
        <div class="cover-content">
            <img src="香港街等你女装/1.png" alt="封面" class="cover-image">
            <div class="cover-overlay">
                <h1 class="cover-title">NEW AT DENG NI ING</h1>
                <p class="cover-subtitle">2026/S 本期新品</p>
                <p class="cover-slogan">让力量与柔美共生</p>
                <button class="enter-btn" onclick="enterMain()">进入商城</button>
            </div>
        </div>
    </div>

    <!-- 主程序界面 -->
    <div id="mainApp" class="container" style="display: none;">
        <header>
            <div class="header-bg"></div>
            <h1>🌸 香港街等你女装 🌸</h1>
            <nav>
                <button class="nav-btn active" onclick="showPage('home')">首页</button>
                <button class="nav-btn" onclick="showPage('manage')">服装管理</button>
                <button class="nav-btn" onclick="showPage('orders')">订单管理</button>
            </nav>
        </header>

        <!-- 首页 - 服装展示 -->
        <div id="home" class="page active">
            <div class="filter-bar">
                <input type="text" id="searchInput" placeholder="搜索服装..." onkeyup="filterClothes()">
                <select id="categorySelect" onchange="filterClothes()">
                    <option value="all">全部分类</option>
                    <option value="连衣裙">连衣裙</option>
                    <option value="T恤">T恤</option>
                    <option value="外套">外套</option>
                    <option value="裤子">裤子</option>
                    <option value="裙子">半身裙</option>
                    <option value="鞋子">鞋子</option>
                    <option value="帽子">帽子</option>
                    <option value="首饰">首饰</option>
                </select>
            </div>
            <div id="clothesGrid" class="clothes-grid">
                <!-- 服装卡片将动态生成 -->
            </div>
        </div>

        

        <!-- 服装管理页面 -->
        <div id="manage" class="page">
            <h2>服装管理</h2>
            
            <!-- 新增服装表单 -->
            <div class="add-section">
                <h3>新增服装</h3>
                <form id="addClothesForm" enctype="multipart/form-data">
                    <div class="form-row">
                        <div class="form-group">
                            <label>服装名称</label>
                            <input type="text" id="addName" required>
                        </div>
                        <div class="form-group">
                            <label>分类</label>
                            <select id="addCategory" required>
                                <option value="连衣裙">连衣裙</option>
                                <option value="T恤">T恤</option>
                                <option value="外套">外套</option>
                                <option value="裤子">裤子</option>
                                <option value="裙子">半身裙</option>
                                <option value="鞋子">鞋子</option>
                                <option value="帽子">帽子</option>
                                <option value="首饰">首饰</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>价格</label>
                            <input type="number" id="addPrice" required min="0" step="0.01">
                        </div>
                        <div class="form-group">
                            <label>上传图片</label>
                            <input type="file" id="addImage" accept="image/*" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>描述</label>
                        <textarea id="addDesc" required rows="2"></textarea>
                    </div>
                    <button type="submit" class="submit-btn">添加服装</button>
                </form>
            </div>
            
            <!-- 服装列表 -->
            <div class="filter-bar">
                <select id="manageStatusSelect" onchange="renderManageClothes()">
                    <option value="all">全部</option>
                    <option value="active">上架中</option>
                    <option value="disabled">已下架</option>
                </select>
            </div>
            <div id="manageGrid" class="manage-grid">
                <!-- 服装管理卡片将动态生成 -->
            </div>
        </div>

        <!-- 订单管理页面 -->
        <div id="orders" class="page">
            <h2>订单管理</h2>
            
            <!-- 统计数据 -->
            <div id="statsDiv" class="stats-section"></div>
            
            <!-- 数据库操作按钮 -->
            <div class="db-actions">
                <button class="db-btn export" onclick="exportDatabase()">导出数据库</button>
                <label class="db-btn import">
                    <input type="file" accept=".json" onchange="importDatabase(event)" style="display:none">
                    导入数据库
                </label>
                <button class="db-btn clear" onclick="clearDatabase()">清空数据</button>
            </div>

            <!-- 云端同步配置 -->
            <div class="cloud-sync-section">
                <h3>云端同步 (JSONBin.io)</h3>
                <div class="cloud-buttons">
                    <button class="cloud-btn primary" onclick="loadFromCloud()">从云端加载</button>
                    <button class="cloud-btn sync" onclick="syncToCloud()">立即同步</button>
                </div>
            </div>
            
            <h3>订单列表</h3>
            <div id="ordersList" class="orders-list">
                <!-- 订单将动态生成 -->
            </div>
        </div>

        <!-- 服装详情弹窗 -->
        <div id="detailModal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="closeModal()">&times;</span>
                <div class="detail-content" id="detailContent">
                    <!-- 详情内容将动态生成 -->
                </div>
            </div>
        </div>

        <!-- 图片大图预览弹窗 -->
        <div id="imageModal" class="modal">
            <span class="close" onclick="closeImageModal()">&times;</span>
            <img id="previewImage" class="preview-large" src="" alt="大图预览">
        </div>

        <!-- 编辑服装弹窗 -->
        <div id="editModal" class="modal">
            <div class="modal-content edit-modal">
                <span class="close" onclick="closeEditModal()">&times;</span>
                <div id="editContent">
                    <!-- 编辑内容将动态生成 -->
                </div>
            </div>
        </div>

        <!-- 登录弹窗 -->
        <div id="loginModal" class="modal">
            <div class="modal-content login-modal">
                <h3>管理员登录</h3>
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="loginUsername" placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="loginPassword" placeholder="请输入密码">
                </div>
                <div class="form-row">
                    <button class="login-btn cancel" onclick="closeLoginModal()">取消</button>
                    <button class="login-btn submit" onclick="checkLogin()">登录</button>
                </div>
                <p id="loginError" class="error-message"></p>
            </div>
        </div>
    </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
